<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitSweep</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <img src="../icons/icon48.png" alt="GitSweep" class="header-icon">
      <h1 class="header-title">GitSweep</h1>
    </div>
    <div class="header-right">
      <button id="refreshBtn" class="icon-btn" title="Refresh comments">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
      <button id="settingsBtn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stat">
      <span class="stat-value" id="totalCount">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat useful">
      <span class="stat-value" id="usefulCount">0</span>
      <span class="stat-label">Useful</span>
    </div>
    <div class="stat noise">
      <span class="stat-value" id="noiseCount">0</span>
      <span class="stat-label">Noise</span>
    </div>
    <div class="stat neutral">
      <span class="stat-value" id="neutralCount">0</span>
      <span class="stat-label">Neutral</span>
    </div>
  </div>

  <!-- Filter Tabs -->
  <nav class="filter-tabs" id="filterTabs" style="display:none;">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="useful">Useful</button>
    <button class="tab" data-filter="noise">Noise</button>
    <button class="tab" data-filter="neutral">Neutral</button>
  </nav>

  <!-- Comment List -->
  <main class="comment-list" id="commentList">
    <!-- Loading State -->
    <div class="state-view" id="loadingState" style="display:none;">
      <div class="spinner"></div>
      <p class="state-text">Sweeping through your repos…</p>
      <p class="state-sub">This may take a moment</p>
    </div>

    <!-- Empty State -->
    <div class="state-view" id="emptyState" style="display:none;">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <p class="state-text">No comments found</p>
      <p class="state-sub">Comments from others on your repos will appear here</p>
    </div>

    <!-- Setup State -->
    <div class="state-view" id="setupState">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
          <polyline points="10 17 15 12 10 7"></polyline>
          <line x1="15" y1="12" x2="3" y2="12"></line>
        </svg>
      </div>
      <p class="state-text">Welcome to GitSweep</p>
      <p class="state-sub">Add your GitHub token in Settings to get started</p>
      <button id="setupBtn" class="primary-btn">Open Settings</button>
    </div>

    <!-- Error State -->
    <div class="state-view" id="errorState" style="display:none;">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
      </div>
      <p class="state-text">Something went wrong</p>
      <p class="state-sub" id="errorMsg">Unable to fetch comments</p>
      <button id="retryBtn" class="primary-btn">Retry</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" id="footer" style="display:none;">
    <span id="lastUpdated" class="footer-text"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
